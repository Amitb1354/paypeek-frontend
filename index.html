<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>PayPeek – Real Anonymous Salaries, Shared by Professionals</title>
    <meta name="description" content="Browse and share real anonymous salaries from professionals worldwide. See what software engineers, designers, marketers and more actually earn — by role, company, and country." />
    <meta name="keywords" content="salary data, anonymous salary, how much does a software engineer earn, salary by country, salary comparison, real salaries, paypeek" />
    <link rel="canonical" href="https://paypeek.co/" />

    <!-- Open Graph (LinkedIn / Facebook sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://paypeek.co/" />
    <meta property="og:title" content="PayPeek – Real Anonymous Salaries" />
    <meta property="og:description" content="See what professionals actually earn. Anonymous salary data shared by real people worldwide." />
    <meta property="og:image" content="https://paypeek.co/og-image.png" />
    <meta property="og:site_name" content="PayPeek" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PayPeek – Real Anonymous Salaries" />
    <meta name="twitter:description" content="See what professionals actually earn. Anonymous salary data shared by real people worldwide." />
    <meta name="twitter:image" content="https://paypeek.co/og-image.png" />

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PayPeek",
      "url": "https://paypeek.co",
      "description": "Anonymous salary data shared by professionals worldwide",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://paypeek.co/browse?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Favicon SVG -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- AdSense: replace with your publisher ID when approved -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
